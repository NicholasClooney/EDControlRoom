[error_messages.templates]
controls_unavailable = "Controls are unavailable. Check the bindings path and binding names, then try again."
routine_unexpected_exception = "Routine hit an unexpected error: {error}."
routine_unexpected_exception_suggestion = "Review the latest ACTIVITY lines for the last completed step, then retry."
station_mismatch_message = "Station mismatch: market data indicates {market_station}, but we are docked at {docked_station}."
station_mismatch_suggestion = "Open replay history with Ctrl-R, press e to edit the station name, then rerun. If this is a different route, start a new haul with the correct station parameters."
route_mismatch_message = "Destination mismatch: expected a route to {expected}, but Elite plotted {actual}."
route_mismatch_suggestion = "Use Ctrl-R then e to edit the destination or haul parameters, or start a new haul with the correct route."
market_target_not_found_message = "Commodity mismatch: {target} was not found in this station's market list."
market_target_not_found_suggestion = "Check the commodity name and station, then use Ctrl-R and e to edit the saved command or start a new haul with the correct parameters."
market_target_data_mismatch_message = "Commodity mismatch: {target} appeared in the station list, but the market data for that commodity did not line up."
market_target_data_mismatch_suggestion = "Refresh the station market, then retry. If the route parameters are wrong, use Ctrl-R and e to edit them."
journal_docked_state_missing_message = "Couldn't confirm the current docked station from the journal yet."
journal_docked_state_missing_suggestion = "Wait until Elite finishes writing the docked state, then retry."
market_data_missing_message = "Couldn't read the station market data yet."
market_data_missing_suggestion = "Open the commodities market fully, wait a moment, then retry."
sell_requires_docked_message = "Sell can only start while we are docked at a station."
sell_requires_docked_suggestion = "Dock first, then rerun the sell step."
sell_return_station_check_message = "Sell completed, but we could not confirm the ship returned to a docked station state afterward."
sell_return_station_check_suggestion = "Check whether the station menu is fully open again, then retry or resume from replay history."
amount_minimum_message = "Amount must be at least 1."
trade_event_timeout_message = "The game did not confirm {event_type} for {target} within {timeout_s:.0f}s."
trade_event_timeout_suggestion = "Check whether the market dialog stayed focused and whether Elite finished writing the trade event, then retry."
cargo_hold_empty_message = "Cargo hold is empty, so there is nothing to sell or continue hauling."
cargo_hold_empty_suggestion = "Restock cargo or start a new haul with the correct station and commodity parameters."
jump_retry_exhausted_message = "Jump did not complete before the retry limit was exhausted."
jump_retry_exhausted_suggestion = "Check FSD state, route, and ship alignment, then retry the jump."
docked_timeout_message = "Docking did not complete before the timeout."
docked_timeout_suggestion = "Confirm docking permission was granted and the ship stayed on the docking path, then retry."
supercruise_exit_timeout_message = "Supercruise exit was not detected before the timeout."
supercruise_exit_timeout_suggestion = "Make sure the ship actually dropped at the target and the journal is still updating, then retry."
docking_request_timeout_message = "Docking permission was not confirmed before the retry limit was exhausted."
docking_request_timeout_suggestion = "Check station distance, left-panel focus, and docking eligibility, then retry."
undocked_timeout_message = "Launch started, but Undocked was not confirmed in time."
undocked_timeout_suggestion = "Check whether the Launch menu step landed correctly, then retry."
no_track_timeout_message = "Undocked was seen, but station-clear confirmation did not arrive in time."
no_track_timeout_suggestion = "Wait until the ship is fully clear of the station, then resume or retry."
reload_failed = "Hot reload failed for {module_name}: {error}."
journal_dir_not_found = "Journal directory could not be resolved (source: {source_status}). Set paths.journal_dir in config.toml or fix CrossOver auto-detection."
dest_usage = "Usage: dest <system name>"
market_filter_usage = "Usage: market filter <item name>"
unknown_help_topic = "Unknown help topic: {topic}"
buy_usage = "Usage: buy <item> [amount|max]"
sell_usage = "Usage: sell <item> [amount|max]"
invalid_amount = "Invalid amount. Use a positive integer or MAX."
haul_params_required = "Two-way haul needs both station names, both station systems, and both buying commodities before it can start."
confirm_yes_no = "Press Enter for yes, or type no to cancel."
station_1_buying_required = "Station 1 buying cargo is required."
station_2_buying_required = "Station 2 buying cargo is required."
station_2_name_required = "Station 2 name is required."
station_2_system_required = "Station 2 system is required."
number_required = "{label} must be a number."
nonnegative_required = "{label} must be non-negative."
sell_all_empty = "Nothing sellable is in cargo right now. Cargo is empty, stolen, or mission-locked."
sell_all_fallback = "Live cargo state was empty, so sell-all is using Cargo.json as a fallback."
