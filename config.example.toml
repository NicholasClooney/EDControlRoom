[paths]
# Leave these blank to use platform auto-detection.
journal_dir = ""
bindings_file = ""

[controls]
start_hotkey = "home"
stop_hotkey = "end"
scanner_mode = "off"
# Minimum dwell for any synthetic key activation.
minimum_action_hold_seconds = 0.1
# Default dwell used for continuous controls like roll/pitch/yaw.
continuous_action_hold_seconds = 0.2
# Delay between individual key presses in any sequence.
step_delay_seconds = 0.3
# Shared settle delay for galaxy-map result loading and route plotting.
galaxy_map_settle_seconds = 2.0
# Default docking timeout for haul-loop station arrivals.
haul_dock_timeout_seconds = 600.0
# Default time to wait for the launch command to produce an Undocked event.
undock_timeout_seconds = 30.0
# Time to wait after Undocked for the music NoTrack event that confirms the ship has cleared the station.
undock_no_track_timeout_seconds = 60.0
# Default time to wait after Undocked for a stricter in-space confirmation event.
undock_in_space_timeout_seconds = 180.0
# Delay between each boost attempt while waiting for FSD mass lock to clear.
mass_lock_boost_delay_seconds = 5.0
# Delay after each UI_Down tap in buy/sell market navigation (covers both the item-list scroll and single down taps).
market_nav_delay_seconds = 0.1
# Maximum buy/sell attempts before aborting when the matching MarketBuy/MarketSell journal event is not observed.
market_trade_max_attempts = 3

[screen]
resolution_width = 1920
resolution_height = 1080
scale = 1.0
capture_debug_path = "artifacts/diagnostics-screen.png"

[screen.capture]
# "fullscreen" keeps the current diagnostic behavior.
# "region" captures only the configured base region below.
mode = "fullscreen"
left = 0.0
top = 0.0
right = 1.0
bottom = 1.0

[screen.capture.regions.center]
left = 0.333333
top = 0.333333
right = 0.666667
bottom = 0.666667

[screen.capture.regions.compass]
left = 0.3125
top = 0.625
right = 0.5
bottom = 0.9375

[runtime]
# Optional override. When omitted, the runtime defaults to the host OS:
# macOS -> "macos", Windows -> "windows".
# Set this explicitly only when you need to override or make the mode obvious in shared configs.
debug = true

[control_room]
state_file = ".control_room_state.json"
history_limit = 20
# Delay before ship-affecting control-room commands begin execution.
command_delay_seconds = 5.0
